<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>InttelTrade AI Stock market Prediction and Trading system — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── Design Tokens ─────────────────────────────────────────────────── */
:root {
  --bg:        #080c10;
  --surface:   #0f1520;
  --card:      #141b26;
  --border:    #1f2d3d;
  --accent:    #00d4aa;
  --accent-dim:#004d3d;
  --red:       #ff4d6a;
  --red-dim:   #4d0016;
  --amber:     #f59e0b;
  --blue:      #3b82f6;
  --text:      #e2e8f0;
  --muted:     #64748b;
  --mono:      'Space Mono', monospace;
  --sans:      'DM Sans', sans-serif;
  --radius:    10px;
  --glow:      0 0 30px rgba(0,212,170,.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,212,170,.08), transparent),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,.015) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,.015) 40px);
}

/* ── Layout ────────────────────────────────────────────────────────── */
.app { display: grid; grid-template-rows: 60px 1fr; min-height: 100vh; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(8,12,16,.9);
  backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100;
}

.logo {
  font-family: var(--mono);
  font-size: 15px;
  letter-spacing: .05em;
  color: var(--accent);
}
.logo span { color: var(--muted); }

.nav-actions { display: flex; align-items: center; gap: 12px; }

main {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 0;
  max-height: calc(100vh - 60px);
  overflow: hidden;
}

/* ── Sidebar ───────────────────────────────────────────────────────── */
.sidebar {
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex; flex-direction: column;
  overflow-y: auto;
  padding: 20px 0;
}

.search-wrap { padding: 0 16px 16px; }

.search-row {
  display: flex; gap: 8px;
}

input[type="text"], input[type="email"], input[type="password"] {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius);
  padding: 9px 12px;
  font-family: var(--mono);
  font-size: 13px;
  outline: none;
  width: 100%;
  transition: border .2s, box-shadow .2s;
}
input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,170,.12); }
input::placeholder { color: var(--muted); }

.btn {
  cursor: pointer; border: none; border-radius: var(--radius);
  font-family: var(--mono); font-size: 12px; font-weight: 700;
  padding: 9px 14px; transition: all .18s; white-space: nowrap;
}
.btn-primary  { background: var(--accent); color: #000; }
.btn-primary:hover  { background: #00ffe0; box-shadow: 0 0 16px rgba(0,212,170,.5); }
.btn-outline  { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
.btn-outline:hover  { background: var(--accent-dim); }
.btn-danger   { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
.btn-danger:hover   { background: var(--red); color: #fff; }
.btn-sm       { padding: 6px 10px; font-size: 11px; }

.section-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: .12em;
  color: var(--muted); text-transform: uppercase;
  padding: 0 16px 8px;
}

.watchlist-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; cursor: pointer;
  border-left: 3px solid transparent;
  transition: all .15s;
}
.watchlist-item:hover { background: var(--card); }
.watchlist-item.active { border-left-color: var(--accent); background: var(--card); }
.wi-symbol { font-family: var(--mono); font-size: 13px; font-weight: 700; }
.wi-right { text-align: right; }
.wi-price { font-family: var(--mono); font-size: 12px; }
.wi-change { font-size: 11px; font-family: var(--mono); }
.up { color: var(--accent); }
.dn { color: var(--red); }

/* ── Content ───────────────────────────────────────────────────────── */
.content { overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; }

/* ── Cards ─────────────────────────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.card-title {
  font-family: var(--mono); font-size: 11px; letter-spacing: .1em;
  color: var(--muted); text-transform: uppercase; margin-bottom: 14px;
}

/* ── Quote Hero ─────────────────────────────────────────────────────── */
.quote-hero {
  display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: start;
}
.quote-name { color: var(--muted); font-size: 13px; margin-bottom: 4px; }
.quote-price {
  font-family: var(--mono); font-size: 42px; font-weight: 700;
  line-height: 1; letter-spacing: -.02em;
}
.quote-change { font-family: var(--mono); font-size: 15px; margin-top: 6px; }

.signal-badge {
  font-family: var(--mono); font-weight: 700; font-size: 22px;
  padding: 12px 24px; border-radius: 8px; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.signal-badge.BUY  { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); box-shadow: var(--glow); }
.signal-badge.SELL { background: var(--red-dim);    color: var(--red);    border: 1px solid var(--red); }
.signal-badge.HOLD { background: rgba(245,158,11,.1); color: var(--amber); border: 1px solid var(--amber); }
.signal-conf { font-size: 11px; font-weight: 400; opacity: .8; }

/* ── Stat Grid ──────────────────────────────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.stat-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.stat-label { font-family: var(--mono); font-size: 9px; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; }
.stat-value { font-family: var(--mono); font-size: 15px; font-weight: 700; margin-top: 4px; }

/* ── Chart ──────────────────────────────────────────────────────────── */
.chart-wrap { position: relative; height: 260px; }

/* ── Indicator Row ──────────────────────────────────────────────────── */
.indicator-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

.ind-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px;
  display: flex; flex-direction: column; gap: 4px;
}
.ind-label { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.ind-value { font-family: var(--mono); font-size: 16px; font-weight: 700; }
.ind-bar-wrap { background: var(--border); border-radius: 99px; height: 4px; margin-top: 4px; overflow: hidden; }
.ind-bar { height: 100%; border-radius: 99px; transition: width .5s ease; }

/* ── Breakdown ──────────────────────────────────────────────────────── */
.breakdown-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.bk-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; text-align: center;
}
.bk-name { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 6px; }
.bk-signal { font-family: var(--mono); font-size: 13px; font-weight: 700; }
.bk-conf { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── Risk Panel ─────────────────────────────────────────────────────── */
.risk-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

/* ── Score Bar ──────────────────────────────────────────────────────── */
.score-bars { display: flex; flex-direction: column; gap: 10px; }
.score-row { display: flex; align-items: center; gap: 10px; }
.score-lbl { font-family: var(--mono); font-size: 11px; width: 36px; }
.score-track { flex: 1; background: var(--border); border-radius: 99px; height: 8px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 99px; transition: width .6s ease; }
.score-num { font-family: var(--mono); font-size: 11px; width: 36px; text-align: right; }

/* ── Auth Modal ─────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.8);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 32px; width: 380px;
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
  transform: translateY(16px); transition: transform .25s ease;
}
.modal-overlay.show .modal { transform: translateY(0); }
.modal-title { font-family: var(--mono); font-size: 18px; color: var(--accent); margin-bottom: 20px; }
.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.form-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .08em; }
.form-error { color: var(--red); font-size: 11px; margin-top: 4px; }
.modal-footer { display: flex; gap: 10px; margin-top: 20px; }
.tab-row { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.tab-btn { flex: 1; padding: 9px; font-family: var(--mono); font-size: 12px; background: transparent; border: none; color: var(--muted); cursor: pointer; transition: .15s; }
.tab-btn.active { background: var(--accent); color: #000; font-weight: 700; }

/* ── Toast ──────────────────────────────────────────────────────────── */
.toast-wrap { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
.toast {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 16px;
  font-family: var(--mono); font-size: 12px;
  max-width: 300px; animation: slideUp .25s ease;
  box-shadow: 0 8px 30px rgba(0,0,0,.4);
}
.toast.success { border-color: var(--accent); color: var(--accent); }
.toast.error   { border-color: var(--red); color: var(--red); }
@keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

/* ── Loading ────────────────────────────────────────────────────────── */
.loading-wrap { display: flex; align-items: center; justify-content: center; height: 200px; gap: 8px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Welcome ────────────────────────────────────────────────────────── */
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 16px; text-align: center; }
.welcome h2 { font-family: var(--mono); font-size: 26px; color: var(--accent); }
.welcome p  { color: var(--muted); max-width: 340px; line-height: 1.6; }

/* ── Fundamentals ───────────────────────────────────────────────────── */
.fund-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

/* ── Scrollbar ──────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>
<div class="app">

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">INTTEL<span>TRADE</span> AI<span style="color:var(--accent);margin-left:6px">▸</span></div>
  <div class="nav-actions">
    <span id="userLabel" style="font-family:var(--mono);font-size:12px;color:var(--muted)"></span>
    <button class="btn btn-outline btn-sm" id="authBtn" onclick="openAuth()">Sign In</button>
  </div>
</header>

<!-- ── Main ──────────────────────────────────────────────────────────── -->
<main>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="search-wrap">
      <div class="search-row">
        <input type="text" id="symbolInput" placeholder="AAPL, TSLA, MSFT…" maxlength="10"
          onkeydown="if(event.key==='Enter')analyzeStock()"/>
        <button class="btn btn-primary" onclick="analyzeStock()">→</button>
      </div>
    </div>
    <div class="section-label">Watchlist</div>
    <div id="watchlistEl"></div>
  </aside>

  <!-- Content -->
  <div class="content" id="contentArea">
    <div class="welcome">
      <h2>// MARKET INTELLIGENCE</h2>
      <p>Enter a stock symbol to analyse live price data, technical indicators, and AI-generated trade signals.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
        <button class="btn btn-outline btn-sm" onclick="quickLoad('AAPL')">AAPL</button>
        <button class="btn btn-outline btn-sm" onclick="quickLoad('TSLA')">TSLA</button>
        <button class="btn btn-outline btn-sm" onclick="quickLoad('NVDA')">NVDA</button>
        <button class="btn btn-outline btn-sm" onclick="quickLoad('MSFT')">MSFT</button>
        <button class="btn btn-outline btn-sm" onclick="quickLoad('BTC-USD')">BTC</button>
      </div>
    </div>
  </div>
</main>
</div>

<!-- ── Auth Modal ──────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <div class="tab-row">
      <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">LOG IN</button>
      <button class="tab-btn" id="registerTab" onclick="switchTab('register')">REGISTER</button>
    </div>
    <div id="loginForm">
      <div class="form-group">
        <label class="form-label">EMAIL</label>
        <input type="email" id="loginEmail" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">PASSWORD</label>
        <input type="password" id="loginPassword" placeholder="••••••••"/>
      </div>
      <div class="form-error" id="loginError"></div>
      <div class="modal-footer">
        <button class="btn btn-primary" style="flex:1" onclick="doLogin()">LOG IN</button>
        <button class="btn btn-outline" onclick="closeAuth()">CANCEL</button>
      </div>
    </div>
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label class="form-label">USERNAME</label>
        <input type="text" id="regUsername" placeholder="trader_99"/>
      </div>
      <div class="form-group">
        <label class="form-label">EMAIL</label>
        <input type="email" id="regEmail" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">PASSWORD (8+ chars, 1 uppercase, 1 digit)</label>
        <input type="password" id="regPassword" placeholder="••••••••"/>
      </div>
      <div class="form-error" id="registerError"></div>
      <div class="modal-footer">
        <button class="btn btn-primary" style="flex:1" onclick="doRegister()">CREATE ACCOUNT</button>
        <button class="btn btn-outline" onclick="closeAuth()">CANCEL</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Toast Container ─────────────────────────────────────────────────── -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const API = 'http://localhost:8000/api/v1';

// ── State ─────────────────────────────────────────────────────────────────
let state = {
  token: localStorage.getItem('access_token'),
  user:  JSON.parse(localStorage.getItem('user') || 'null'),
  watchlist: JSON.parse(localStorage.getItem('watchlist') || '["AAPL","TSLA","NVDA"]'),
  currentSymbol: null,
  chartInstance: null,
};

// ── API Helper ────────────────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  const res = await fetch(API + path, { ...opts, headers });
  const data = await res.json();
  if (!res.ok) {
    // FastAPI 422 returns detail as an array of validation error objects
    if (Array.isArray(data.detail)) {
      const msgs = data.detail.map(e => {
        const field = e.loc ? e.loc[e.loc.length - 1] : '';
        return field ? `${field}: ${e.msg}` : e.msg;
      });
      throw new Error(msgs.join(' | '));
    }
    throw new Error(data.detail || `HTTP ${res.status}`);
  }
  return data;
}

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Auth ──────────────────────────────────────────────────────────────────
function openAuth()  { document.getElementById('authModal').classList.add('show'); }
function closeAuth() { document.getElementById('authModal').classList.remove('show'); }

function switchTab(tab) {
  document.getElementById('loginForm').style.display    = tab === 'login' ? '' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('loginTab').classList.toggle('active', tab === 'login');
  document.getElementById('registerTab').classList.toggle('active', tab === 'register');
}

async function doLogin() {
  document.getElementById('loginError').textContent = '';
  try {
    const data = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email: loginEmail.value, password: loginPassword.value }),
    });
    state.token = data.access_token;
    state.user  = { username: data.username, email: data.email };
    localStorage.setItem('access_token', state.token);
    localStorage.setItem('user', JSON.stringify(state.user));
    updateUserUI();
    closeAuth();
    toast(`Welcome back, ${data.username}!`);
  } catch(e) {
    document.getElementById('loginError').textContent = e.message;
  }
}

async function doRegister() {
  const errEl = document.getElementById('registerError');
  errEl.textContent = '';

  // Client-side pre-validation — mirrors backend rules exactly
  const u = regUsername.value.trim();
  const p = regPassword.value;
  if (u.length < 3)                           { errEl.textContent = 'Username must be at least 3 characters.'; return; }
  if (!/^[A-Za-z0-9_.\-]+$/.test(u))         { errEl.textContent = 'Username: letters, numbers, _ - . only.'; return; }
  if (p.length < 8)                           { errEl.textContent = 'Password must be at least 8 characters.'; return; }
  if (!/[A-Z]/.test(p))                       { errEl.textContent = 'Password must contain at least one uppercase letter.'; return; }
  if (!/\d/.test(p))                          { errEl.textContent = 'Password must contain at least one digit.'; return; }

  try {
    await apiFetch('/auth/register', {
      method: 'POST',
      body: JSON.stringify({ username: u, email: regEmail.value.trim(), password: p }),
    });
    toast('Account created! Please log in.');
    switchTab('login');
    // Pre-fill email for convenience
    document.getElementById('loginEmail').value = regEmail.value.trim();
  } catch(e) {
    errEl.textContent = e.message;
  }
}

function doLogout() {
  state.token = null; state.user = null;
  localStorage.removeItem('access_token');
  localStorage.removeItem('user');
  updateUserUI();
  toast('Signed out.', 'success');
}

function updateUserUI() {
  const lbl = document.getElementById('userLabel');
  const btn = document.getElementById('authBtn');
  if (state.user) {
    lbl.textContent = state.user.username;
    btn.textContent = 'LOG OUT';
    btn.onclick = doLogout;
  } else {
    lbl.textContent = '';
    btn.textContent = 'SIGN IN';
    btn.onclick = openAuth;
  }
}

// ── Watchlist ─────────────────────────────────────────────────────────────
function renderWatchlist() {
  const el = document.getElementById('watchlistEl');
  el.innerHTML = state.watchlist.map(sym => `
    <div class="watchlist-item ${sym === state.currentSymbol ? 'active' : ''}" onclick="quickLoad('${sym}')">
      <div class="wi-symbol">${sym}</div>
      <div class="wi-right">
        <div class="wi-price" id="wl-price-${sym}">—</div>
        <div class="wi-change" id="wl-chg-${sym}">—</div>
      </div>
    </div>
  `).join('');

  // Load prices async
  state.watchlist.forEach(async sym => {
    try {
      const d = await apiFetch(`/stock/${sym}`);
      const priceEl = document.getElementById(`wl-price-${sym}`);
      const chgEl   = document.getElementById(`wl-chg-${sym}`);
      if (priceEl) priceEl.textContent = `$${d.current_price.toFixed(2)}`;
      if (chgEl) {
        const cls = d.change >= 0 ? 'up' : 'dn';
        chgEl.innerHTML = `<span class="${cls}">${d.change >= 0 ? '+' : ''}${d.change_pct.toFixed(2)}%</span>`;
      }
    } catch(_) {}
  });
}

function addToWatchlist(sym) {
  if (!state.watchlist.includes(sym)) {
    state.watchlist.push(sym);
    localStorage.setItem('watchlist', JSON.stringify(state.watchlist));
    renderWatchlist();
    toast(`${sym} added to watchlist`);
  }
}

// ── Main Analysis ─────────────────────────────────────────────────────────
function quickLoad(sym) {
  document.getElementById('symbolInput').value = sym;
  analyzeStock();
}

async function analyzeStock() {
  const raw = document.getElementById('symbolInput').value.trim().toUpperCase();
  if (!raw) return;
  state.currentSymbol = raw;
  renderWatchlist();

  const content = document.getElementById('contentArea');
  content.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><span style="font-family:var(--mono);color:var(--muted)">Fetching ${raw}…</span></div>`;

  try {
    const [quote, pred, hist] = await Promise.all([
      apiFetch(`/stock/${raw}`),
      apiFetch(`/predict/${raw}?period=6mo`),
      apiFetch(`/stock/${raw}/history?period=3mo`),
    ]);
    renderDashboard(quote, pred, hist);
  } catch(e) {
    content.innerHTML = `<div class="welcome"><h2 style="color:var(--red)">// ERROR</h2><p style="color:var(--muted)">${e.message}</p></div>`;
  }
}

// ── Dashboard Render ──────────────────────────────────────────────────────
function renderDashboard(quote, pred, hist) {
  const content = document.getElementById('contentArea');
  const chg = quote.change >= 0;
  const signalColor = pred.signal === 'BUY' ? 'var(--accent)' : pred.signal === 'SELL' ? 'var(--red)' : 'var(--amber)';

  content.innerHTML = `

  <!-- Quote Hero -->
  <div class="card">
    <div class="quote-hero">
      <div>
        <div class="quote-name">${quote.name || quote.symbol} · ${quote.exchange || ''} · ${quote.currency || 'USD'}</div>
        <div class="quote-price">${quote.current_price.toFixed(2)}</div>
        <div class="quote-change ${chg ? 'up' : 'dn'}">
          ${chg ? '▲' : '▼'} ${Math.abs(quote.change).toFixed(2)} (${Math.abs(quote.change_pct).toFixed(2)}%)&nbsp;&nbsp;
          <span style="color:var(--muted)">vs prev close $${quote.previous_close}</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px">
        <div class="signal-badge ${pred.signal}">
          ${pred.signal}
          <span class="signal-conf">${pred.confidence}% confidence</span>
        </div>
        <button class="btn btn-outline btn-sm" onclick="addToWatchlist('${quote.symbol}')">+ Watchlist</button>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stat-grid">
    <div class="stat-item"><div class="stat-label">Open</div><div class="stat-value">$${quote.open?.toFixed(2) ?? '—'}</div></div>
    <div class="stat-item"><div class="stat-label">High</div><div class="stat-value up">$${quote.high?.toFixed(2) ?? '—'}</div></div>
    <div class="stat-item"><div class="stat-label">Low</div><div class="stat-value dn">$${quote.low?.toFixed(2) ?? '—'}</div></div>
    <div class="stat-item"><div class="stat-label">Volume</div><div class="stat-value">${fmtNum(quote.volume)}</div></div>
    <div class="stat-item"><div class="stat-label">Mkt Cap</div><div class="stat-value">${fmtBig(quote.market_cap)}</div></div>
    <div class="stat-item"><div class="stat-label">P/E Ratio</div><div class="stat-value">${quote.pe_ratio?.toFixed(1) ?? '—'}</div></div>
    <div class="stat-item"><div class="stat-label">52W High</div><div class="stat-value">${quote.week_52_high?.toFixed(2) ?? '—'}</div></div>
    <div class="stat-item"><div class="stat-label">52W Low</div><div class="stat-value">${quote.week_52_low?.toFixed(2) ?? '—'}</div></div>
  </div>

  <!-- Price Chart -->
  <div class="card">
    <div class="card-title">3-Month Price Chart</div>
    <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
  </div>

  <!-- Signal Score Breakdown -->
  <div class="card">
    <div class="card-title">Signal Score Breakdown</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="score-bars">
        ${scoreBar('BUY',  pred.buy_score,  'var(--accent)')}
        ${scoreBar('SELL', pred.sell_score, 'var(--red)')}
        ${scoreBar('HOLD', pred.hold_score, 'var(--amber)')}
      </div>
      <div class="breakdown-grid" style="grid-template-columns:repeat(5,1fr)">
        ${Object.entries(pred.breakdown || {}).map(([name, {signal, confidence}]) => `
          <div class="bk-item">
            <div class="bk-name">${name.toUpperCase()}</div>
            <div class="bk-signal ${signal === 'BUY' ? 'up' : signal === 'SELL' ? 'dn' : ''}" style="color:${signal==='HOLD'?'var(--amber)':''}">
              ${signal}
            </div>
            <div class="bk-conf">${confidence}%</div>
          </div>
        `).join('')}
      </div>
    </div>
  </div>

  <!-- Technical Indicators -->
  <div class="card">
    <div class="card-title">Technical Indicators</div>
    <div class="indicator-grid">
      ${indItem('RSI (14)', pred.indicators.rsi?.toFixed(1), pred.indicators.rsi, 0, 100, rsiColor(pred.indicators.rsi))}
      ${indItem('MACD', pred.indicators.macd?.toFixed(4), null, null, null, pred.indicators.macd >= 0 ? 'var(--accent)' : 'var(--red)')}
      ${indItem('Stoch %K', pred.indicators.stoch_k?.toFixed(1), pred.indicators.stoch_k, 0, 100, stochColor(pred.indicators.stoch_k))}
      ${indItem('SMA 20', '$'+pred.indicators.sma_20?.toFixed(2), null, null, null, 'var(--blue)')}
      ${indItem('SMA 50', '$'+pred.indicators.sma_50?.toFixed(2), null, null, null, 'var(--blue)')}
      ${indItem('SMA 200', '$'+pred.indicators.sma_200?.toFixed(2), null, null, null, 'var(--blue)')}
      ${indItem('ATR', pred.indicators.atr?.toFixed(2), null, null, null, 'var(--muted)')}
      ${indItem('Volatility', (pred.indicators.volatility * 100)?.toFixed(2)+'%', null, null, null, 'var(--muted)')}
      ${indItem('BB %B', pred.indicators.bb_pct?.toFixed(3), pred.indicators.bb_pct, 0, 1, bbColor(pred.indicators.bb_pct))}
    </div>
  </div>

  <!-- Risk Management -->
  <div class="card">
    <div class="card-title">Risk Management</div>
    <div class="risk-row">
      <div class="stat-item">
        <div class="stat-label">Current Price</div>
        <div class="stat-value">$${quote.current_price.toFixed(4)}</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Stop Loss</div>
        <div class="stat-value dn">${pred.risk_management.stop_loss ? '$' + pred.risk_management.stop_loss : '—'}</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Take Profit</div>
        <div class="stat-value up">${pred.risk_management.take_profit ? '$' + pred.risk_management.take_profit : '—'}</div>
      </div>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:12px">⚠ Stop loss and take profit levels are estimated using 1.5× ATR. This is not financial advice.</p>
  </div>

  `;

  renderChart(hist.data);
}

function scoreBar(label, value, color) {
  return `<div class="score-row">
    <span class="score-lbl" style="color:${color}">${label}</span>
    <div class="score-track"><div class="score-fill" style="width:${value}%;background:${color}"></div></div>
    <span class="score-num" style="color:${color}">${value?.toFixed(1)}%</span>
  </div>`;
}

function indItem(label, val, barVal, barMin, barMax, color) {
  const hasBar = barVal !== null && barMin !== null && barMax !== null;
  const pct = hasBar ? ((barVal - barMin) / (barMax - barMin)) * 100 : 0;
  return `<div class="ind-item">
    <div class="ind-label">${label}</div>
    <div class="ind-value" style="color:${color}">${val ?? '—'}</div>
    ${hasBar ? `<div class="ind-bar-wrap"><div class="ind-bar" style="width:${pct}%;background:${color}"></div></div>` : ''}
  </div>`;
}

function rsiColor(v)   { return v < 30 ? 'var(--accent)' : v > 70 ? 'var(--red)' : 'var(--text)'; }
function stochColor(v) { return v < 20 ? 'var(--accent)' : v > 80 ? 'var(--red)' : 'var(--text)'; }
function bbColor(v)    { return v < 0.1 ? 'var(--accent)' : v > 0.9 ? 'var(--red)' : 'var(--text)'; }

// ── Chart ──────────────────────────────────────────────────────────────────
function renderChart(data) {
  if (state.chartInstance) { state.chartInstance.destroy(); state.chartInstance = null; }
  const ctx = document.getElementById('priceChart');
  if (!ctx) return;

  const labels = data.map(d => d.date);
  const prices = data.map(d => d.close);
  const sma20  = smaLine(prices, 20);
  const sma50  = smaLine(prices, 50);

  state.chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Price', data: prices,
          borderColor: '#00d4aa', borderWidth: 2, pointRadius: 0,
          fill: true,
          backgroundColor: (ctx) => {
            const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 260);
            g.addColorStop(0, 'rgba(0,212,170,.2)'); g.addColorStop(1, 'rgba(0,212,170,0)');
            return g;
          },
          tension: 0.3,
        },
        { label: 'SMA 20', data: sma20, borderColor: '#3b82f6', borderWidth: 1.5, pointRadius: 0, borderDash: [4,4], tension: 0.3 },
        { label: 'SMA 50', data: sma50, borderColor: '#f59e0b', borderWidth: 1.5, pointRadius: 0, borderDash: [4,4], tension: 0.3 },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#64748b', font: { family: 'Space Mono', size: 11 }, boxWidth: 20 } },
        tooltip: {
          backgroundColor: '#141b26', borderColor: '#1f2d3d', borderWidth: 1,
          titleFont: { family: 'Space Mono' }, bodyFont: { family: 'Space Mono', size: 11 },
          callbacks: { label: ctx => ` ${ctx.dataset.label}: $${ctx.parsed.y?.toFixed(4)}` },
        },
      },
      scales: {
        x: { ticks: { color: '#64748b', font: { family: 'Space Mono', size: 10 }, maxTicksLimit: 8 }, grid: { color: '#1f2d3d' } },
        y: { ticks: { color: '#64748b', font: { family: 'Space Mono', size: 10 }, callback: v => '$' + v.toFixed(0) }, grid: { color: '#1f2d3d' } },
      },
    },
  });
}

function smaLine(data, period) {
  return data.map((_, i) => {
    if (i < period - 1) return null;
    const slice = data.slice(i - period + 1, i + 1);
    return slice.reduce((a, b) => a + b, 0) / slice.length;
  });
}

// ── Formatters ─────────────────────────────────────────────────────────────
function fmtNum(n) {
  if (!n) return '—';
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  return n.toLocaleString();
}
function fmtBig(n) {
  if (!n) return '—';
  if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return '$' + (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6)  return '$' + (n / 1e6).toFixed(2) + 'M';
  return '$' + n.toLocaleString();
}

// ── Init ──────────────────────────────────────────────────────────────────
updateUserUI();
renderWatchlist();
</script>
</body>
</html>
